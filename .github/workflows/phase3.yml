name: phase-iii

on:
  push:
  pull_request:

jobs:
  boot:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc \
            binutils \
            bison \
            build-essential \
            bzip2 \
            ca-certificates \
            cpio \
            curl \
            debootstrap \
            e2fsprogs \
            file \
            flex \
            gzip \
            libelf-dev \
            libssl-dev \
            make \
            musl-tools \
            qemu-system-x86 \
            xz-utils

      - name: Check tools
        run: make deps

      - name: Build
        run: sudo -E env "PATH=$PATH" make all

      - name: Phase III boot smoke test
        run: sudo -E env "PATH=$PATH" make smoke

      - name: Guest network smoke test
        run: sudo -E env "PATH=$PATH" make smoke-net

      - name: Guest apt smoke test
        run: sudo -E env "PATH=$PATH" make smoke-apt
